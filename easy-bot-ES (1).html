<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Easy Bot — Asistente IA de EasyPageX</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE600;
    --yellow-hot: #FFB800;
    --yellow-deep: #CC9200;
    --black: #0A0A0A;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #222222;
    --accent: #FF6B00;
    --cyan: #00F5FF;
    --white: #FFFFFF;
    --text-muted: #888888;
    --bubble-bot: #1E1E00;
    --bubble-user: #2A2A00;
    --glow: 0 0 20px rgba(255,230,0,0.4);
    --glow-strong: 0 0 40px rgba(255,230,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--black);
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,230,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,230,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #0D0D00 0%, #0A0A0A 100%);
    box-shadow: 0 0 60px rgba(255,230,0,0.15);
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1A1A00, #111100);
    border-bottom: 2px solid var(--yellow);
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--glow);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--yellow), var(--cyan), var(--yellow), transparent);
    animation: scanline 3s linear infinite;
  }

  @keyframes scanline {
    0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; }
  }

  .bot-avatar {
    width: 44px; height: 44px;
    background: var(--yellow);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: var(--glow-strong);
    flex-shrink: 0;
    animation: pulse-avatar 2s ease-in-out infinite;
  }

  @keyframes pulse-avatar {
    0%,100% { box-shadow: 0 0 20px rgba(255,230,0,0.5); }
    50% { box-shadow: 0 0 40px rgba(255,230,0,0.9), 0 0 80px rgba(255,230,0,0.3); }
  }

  .header-info { flex: 1; }

  .bot-name {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 16px;
    color: var(--yellow);
    letter-spacing: 2px;
    text-shadow: var(--glow);
  }

  .bot-status {
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: #00FF88;
    border-radius: 50%;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .powered-by {
    font-size: 9px;
    color: var(--yellow-deep);
    font-family: 'Orbitron', monospace;
    text-align: right;
    letter-spacing: 1px;
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--yellow); border-radius: 2px; }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.3s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(10px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .msg-icon {
    background: var(--yellow);
    box-shadow: 0 0 12px rgba(255,230,0,0.4);
  }

  .msg.user .msg-icon {
    background: var(--dark3);
    border: 1px solid rgba(255,230,0,0.3);
  }

  .msg-bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .msg.bot .msg-bubble {
    background: linear-gradient(135deg, #1E1E00, #151500);
    border: 1px solid rgba(255,230,0,0.25);
    border-radius: 4px 14px 14px 14px;
    color: #F0E68C;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #2A2000, #1A1500);
    border: 1px solid rgba(255,184,0,0.4);
    border-radius: 14px 4px 14px 14px;
    color: var(--yellow);
    text-align: right;
    font-weight: 600;
  }

  .msg-bubble strong {
    color: var(--yellow);
    font-weight: 700;
  }

  .msg-bubble .stat {
    display: inline-block;
    background: rgba(255,230,0,0.15);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--yellow);
    font-weight: 700;
    font-size: 13px;
    margin: 2px 2px;
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 10px 8px 4px;
    animation: fadeUp 0.5s ease forwards;
  }

  .welcome-title {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--yellow);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-shadow: var(--glow);
  }

  .welcome-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  /* QUICK QUESTIONS */
  #questions-panel {
    padding: 8px 14px 4px;
    flex-shrink: 0;
  }

  .q-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: var(--yellow-deep);
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .q-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .q-btn {
    background: linear-gradient(135deg, #1A1500, #0F0F00);
    border: 1px solid rgba(255,230,0,0.3);
    border-radius: 8px;
    padding: 8px 10px;
    color: rgba(255,230,0,0.85);
    font-family: 'Rajdhani', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    line-height: 1.3;
    letter-spacing: 0.2px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .q-btn:hover, .q-btn:active {
    background: linear-gradient(135deg, #2A2200, #1A1700);
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 0 0 12px rgba(255,230,0,0.2);
    transform: scale(0.98);
  }

  .q-btn.used {
    opacity: 0.4;
    pointer-events: none;
  }

  /* CTA BUTTON */
  #cta-bar {
    padding: 8px 14px 6px;
    flex-shrink: 0;
  }

  #cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px 16px;
    background: linear-gradient(135deg, var(--yellow), var(--yellow-hot));
    border: none;
    border-radius: 10px;
    color: #0A0A00;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2px;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,230,0,0.35), 0 3px 10px rgba(0,0,0,0.4);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
  }

  #cta-btn:hover, #cta-btn:active {
    background: linear-gradient(135deg, #fff176, var(--yellow));
    box-shadow: 0 0 36px rgba(255,230,0,0.6), 0 4px 14px rgba(0,0,0,0.5);
    transform: scale(0.98);
  }

  #cta-btn .cta-arrow {
    font-size: 15px;
    transition: transform 0.2s;
  }

  #cta-btn:hover .cta-arrow {
    transform: translateX(3px);
  }

  /* INPUT */
  #input-area {
    padding: 10px 14px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, #0D0D00, #0A0A0A);
    border-top: 1px solid rgba(255,230,0,0.2);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: #161600;
    border: 1px solid rgba(255,230,0,0.35);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--yellow);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  #user-input::placeholder { color: rgba(255,230,0,0.3); }

  #user-input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 16px rgba(255,230,0,0.2);
  }

  #send-btn {
    width: 42px; height: 42px;
    background: var(--yellow);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: var(--glow);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  #send-btn:hover, #send-btn:active {
    background: var(--yellow-hot);
    box-shadow: var(--glow-strong);
    transform: scale(0.95);
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 14px;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--yellow);
    border-radius: 50%;
    animation: bounce 1s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity:0.4; }
    50% { transform: translateY(-5px); opacity:1; }
  }

  /* Divider */
  .divider {
    text-align: center;
    font-size: 10px;
    color: rgba(255,230,0,0.25);
    font-family: 'Orbitron', monospace;
    letter-spacing: 2px;
    margin: 4px 0;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="bot-avatar">⚡</div>
    <div class="header-info">
      <div class="bot-name">EASY BOT</div>
      <div class="bot-status">
        <span class="status-dot"></span>
        EN LÍNEA · LISTO PARA AYUDAR
      </div>
    </div>
    <div class="powered-by">CREADO POR<br>EASYPAGEX</div>
  </header>

  <div id="chat">
    <div class="welcome">
      <div class="welcome-title">⚡ HOLA, SOY EASY BOT</div>
      <div class="welcome-sub">Tu experto IA de EasyPageX — pregúntame lo que quieras sobre landing pages, conversiones y crecimiento.</div>
    </div>
    <div class="divider">── ELIGE UNA PREGUNTA O ESCRIBE ABAJO ──</div>
  </div>

  <div id="questions-panel">
    <div class="q-label">⚡ Preguntas Frecuentes</div>
    <div class="q-grid" id="q-grid"></div>
  </div>

  <div id="cta-bar">
    <a id="cta-btn" href="https://easypagex.github.io/whye/" target="_blank" rel="noopener">
      🚀 <span>VISITA EASYPAGEX</span> <span class="cta-arrow">→</span>
    </a>
  </div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Pregúntame lo que quieras…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="send-btn">➤</button>
  </div>

</div>

<script>
const QA = [
  {
    q: "¿Por qué necesito una landing page?",
    a: `<strong>Tu landing page es tu mejor vendedor — trabajando 24/7.</strong><br><br>
A diferencia de una página de inicio genérica que intenta abarcarlo todo, una landing page dedicada tiene UN solo objetivo: convertir visitantes en clientes.<br><br>
📊 Datos clave:<br>
<span class="stat">5× más conversiones</span> frente a una página de inicio genérica<br>
<span class="stat">80%</span> de los negocios sin landing page pierden clientes cada día<br>
<span class="stat">48% más contactos</span> con buenas imágenes en tu página<br><br>
EasyPageX crea páginas que captan la atención, comunican tu valor y generan acción — rápido.`
  },
  {
    q: "¿Cómo aumentan las ventas?",
    a: `<strong>Un enfoque claro = menos fricción = más ingresos.</strong><br><br>
Una landing page elimina distracciones. Solo hay una llamada a la acción: Compra, Regístrate, Reserva una llamada. Esa claridad reduce la parálisis de decisión y aumenta directamente las conversiones.<br><br>
📊 Lo que dicen los datos:<br>
<span class="stat">96%</span> de los visitantes no compran en la primera visita<br>
<span class="stat">5×</span> mayor tasa de conversión frente a la página de inicio<br><br>
Las páginas de EasyPageX están diseñadas con estructuras optimizadas para convertir, textos persuasivos y prueba social — cada elemento pensado para impulsar la acción.`
  },
  {
    q: "¿Y la captación de leads?",
    a: `<strong>La mayoría se va — pero una landing page los mantiene en tu embudo.</strong><br><br>
Como el <span class="stat">96%</span> de los visitantes no compran de inmediato, capturar el email es fundamental. Las páginas de EasyPageX recogen correos para que puedas hacer seguimiento, generar confianza y recuperarlos cuando estén listos.<br><br>
💡 Tu lista de emails se convierte en tu activo más valioso — tuyo, no alquilado a los algoritmos de las redes sociales. Cada lead captado es ingresos potenciales que de otro modo se perderían para siempre.`
  },
  {
    q: "¿Puede hacer crecer mis redes?",
    a: `<strong>Sí — tu landing page se convierte en un hub de crecimiento para todos tus canales.</strong><br><br>
EasyPageX enlaza directamente tu Instagram, X (Twitter) y LinkedIn desde tu página. Cada visitante puede convertirse en seguidor en múltiples plataformas — haciendo crecer tu comunidad <span class="stat">24/7</span>, de forma automática.<br><br>
🚀 En lugar de enviar tráfico a una sola plataforma, multiplicas el alcance. Un visitante de Google Ads se convierte en seguidor de Instagram Y en suscriptor de email en una sola visita.`
  },
  {
    q: "¿En cuánto tiempo puedo lanzar?",
    a: `<strong>De cero a activo en días — no en semanas.</strong><br><br>
El proceso de EasyPageX son 4 pasos sencillos:<br><br>
<strong>1.</strong> 💬 Cuéntanos tu visión (minutos)<br>
<strong>2.</strong> ✍️ Diseñamos tu página (personalizada, mobile-first)<br>
<strong>3.</strong> 🔍 Tú revisas y apruebas (ajustes incluidos)<br>
<strong>4.</strong> 🚀 Se activa — los clientes empiezan a llegar desde el primer día<br><br>
<span class="stat">Resultados desde el día uno</span> — sin ciclos de desarrollo largos, sin dolores de cabeza técnicos. Tú te centras en tu negocio; nosotros del resto.`
  },
  {
    q: "¿Es compatible con móviles?",
    a: `<strong>100% mobile-first — siempre.</strong><br><br>
EasyPageX diseña cada landing page con enfoque mobile-first. Con más del <span class="stat">60%</span> del tráfico web procedente de smartphones, una página que no se vea perfecta en móvil está dejando dinero sobre la mesa.<br><br>
📱 Cada página incluye:<br>
• Carga rápida en redes móviles<br>
• Botones y formularios optimizados para pantalla táctil<br>
• Diseño responsive en todos los tamaños<br>
• Posicionamiento potenciado en Google para móvil<br><br>
Tu página se verá espectacular en iPhone, Android y cualquier dispositivo.`
  },
  {
    q: "¿Cómo atrae tráfico cualificado?",
    a: `<strong>Dirige cada clic de anuncio a una página diseñada para convertir — no a tu inicio recargado.</strong><br><br>
Cuando publicas anuncios en Instagram, Google o X, enviar el tráfico a tu página de inicio desperdicia dinero. Tu homepage tiene demasiadas distracciones.<br><br>
Las landing pages de EasyPageX están construidas específicamente para cada fuente de tráfico:<br>
<span class="stat">↑ ROI publicitario</span> — cada clic aterriza en una página relevante y enfocada<br>
<span class="stat">↓ Tasa de rebote</span> — los visitantes ven exactamente lo que buscaban<br>
<span class="stat">↑ Quality Score</span> — Google premia la relevancia con menores costes de anuncio<br><br>
Tráfico cualificado + página enfocada = máximo rendimiento por clic.`
  },
  {
    q: "¿Qué diferencia a EasyPageX?",
    a: `<strong>Velocidad, resultados y cero dolores de cabeza técnicos.</strong><br><br>
EasyPageX está creado específicamente para pequeños negocios que necesitan resultados rápidos — sin contratar un equipo de desarrollo ni pelearse con herramientas complicadas.<br><br>
✅ Diseño personalizado (sin plantillas)<br>
✅ Optimizado para convertir desde el primer día<br>
✅ Mobile-first y carga rápida<br>
✅ Enlace con redes sociales integrado<br>
✅ Revisas y apruebas antes de publicar<br>
✅ Ajustes incluidos — sin costes sorpresa<br><br>
<span class="stat">48% más leads</span> con buenas imágenes. EasyPageX aporta esa ventaja profesional que convierte visitantes en compradores.`
  }
];

const chatEl = document.getElementById('chat');
const qGrid = document.getElementById('q-grid');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

// Build question buttons
QA.forEach((item, i) => {
  const btn = document.createElement('button');
  btn.className = 'q-btn';
  btn.textContent = item.q;
  btn.dataset.index = i;
  btn.addEventListener('click', () => handleQuestion(item.q, item.a, btn));
  qGrid.appendChild(btn);
});

function appendMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'bot' ? '⚡' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html;

  div.appendChild(icon);
  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-msg';

  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = '⚡';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  div.appendChild(icon);
  div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function handleQuestion(question, answer, btn) {
  if (btn) btn.classList.add('used');
  appendMsg('user', question);
  showTyping();
  setTimeout(() => {
    removeTyping();
    appendMsg('bot', answer);
  }, 700 + Math.random() * 400);
}

function handleFreeInput() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';

  // Try to match a known question
  const lower = text.toLowerCase();
  let matched = null;

  for (let item of QA) {
    const keywords = item.q.toLowerCase().split(' ').filter(w => w.length > 3);
    const hits = keywords.filter(k => lower.includes(k));
    if (hits.length >= 2 || lower.includes(item.q.toLowerCase().slice(0, 12))) {
      matched = item;
      break;
    }
  }

  appendMsg('user', text);
  showTyping();

  setTimeout(() => {
    removeTyping();
    if (matched) {
      appendMsg('bot', matched.a);
    } else {
      let fallback = getFallback(lower);
      appendMsg('bot', fallback);
    }
  }, 600 + Math.random() * 500);
}

function getFallback(lower) {
  if (lower.includes('precio') || lower.includes('coste') || lower.includes('costo') || lower.includes('cuánto') || lower.includes('barato') || lower.includes('cuanto')) {
    return `<strong>¡Buena pregunta sobre precios!</strong><br><br>EasyPageX ofrece landing pages rápidas y personalizadas para pequeños negocios. Para detalles concretos de precios, lo mejor es contactar directamente en <strong>easypagex.github.io</strong> — adaptarán la solución a tu presupuesto y objetivos.<br><br>Incluye: diseño personalizado, mobile-first, optimizado para conversiones y ajustes incluidos. <span class="stat">Resultados desde el día uno.</span>`;
  }
  if (lower.includes('tiempo') || lower.includes('cuánto tarda') || lower.includes('rápido') || lower.includes('rapido') || lower.includes('pronto')) {
    return `<strong>EasyPageX está hecho para la velocidad.</strong><br><br>El proceso es: visión → diseño → revisión → lanzamiento. La mayoría de páginas se publican en días, no en semanas. Tú revisas y apruebas antes de que salga nada. <span class="stat">Los clientes empiezan a llegar desde el primer día.</span>`;
  }
